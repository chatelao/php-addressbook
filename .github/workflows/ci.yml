name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - php: '5.4'
            extensions: 'mysql, mysqli'
          - php: '5.5'
            extensions: 'mysql, mysqli'
          - php: '5.6'
            extensions: 'mysql, mysqli'
          - php: '7.0'
            extensions: 'mysqli'

    services:
      mysql:
        image: mysql:5.5
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: error_reporting=E_ALL

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Run regression tests
        run: |
          # Create a wrapper for mysql to use the service container and password
          # Use absolute path to /usr/bin/mysql to avoid infinite recursion
          echo '#!/bin/bash' > /tmp/mysql
          echo '/usr/bin/mysql -h 127.0.0.1 -u root -proot "$@"' >> /tmp/mysql
          chmod +x /tmp/mysql
          export PATH=/tmp:$PATH

          bash .github-offline/regression-tests.sh
