name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '5.4'
            extensions: 'mysql, mysqli'
          - php: '5.5'
            extensions: 'mysql, mysqli'
          - php: '5.6'
            extensions: 'mysql, mysqli'
          - php: '7.0'
            extensions: 'mysqli'
          - php: '8.3'
            extensions: 'mysqli'

    services:
      mysql:
        image: mysql:5.5
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: |
            error_reporting=E_ALL
            display_errors=1

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Run regression tests
        id: tests
        continue-on-error: ${{ matrix.php == '8.3' }}
        run: |
          # Create a wrapper for mysql to use the service container and password
          # Use absolute path to /usr/bin/mysql to avoid infinite recursion
          echo '#!/bin/bash' > /tmp/mysql
          echo '/usr/bin/mysql -h 127.0.0.1 -u root -proot "$@"' >> /tmp/mysql
          chmod +x /tmp/mysql
          export PATH=/tmp:$PATH

          bash .github-offline/regression-tests.sh

      - name: Frontend Verification
        if: always()
        run: |
          # Install dependencies for Playwright
          pip install playwright || echo "Playwright install failed"
          playwright install chromium || echo "Playwright chromium install failed"
          # Run the web server in background if it's not already running
          php -S localhost:8000 -t . > server.log 2>&1 &
          sleep 2
          python .github/verify_frontend.py || echo "Frontend verification failed"
          kill $! || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-php-${{ matrix.php }}
          path: "*.log"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-php-${{ matrix.php }}
          path: verification/*.png
