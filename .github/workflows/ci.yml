name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '5.4'
            extensions: 'mysql, mysqli'
          - php: '5.5'
            extensions: 'mysql, mysqli'
          - php: '5.6'
            extensions: 'mysql, mysqli'
          - php: '7.0'
            extensions: 'mysqli'
          - php: '8.3'
            extensions: 'mysqli'

    services:
      mysql:
        image: mysql:5.5
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          key: cache-extensions-v1

      - name: Cache extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: |
            error_reporting=E_ALL
            display_errors=1

      - name: Install MySQL client
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: mysql-client
          version: 1.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: .github/requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('.github/requirements.txt') }}

      - name: Run regression tests
        id: tests
        continue-on-error: ${{ matrix.php == '8.3' }}
        run: |
          # Create a wrapper for mysql to use the service container and password
          # Use absolute path to /usr/bin/mysql to avoid infinite recursion
          echo '#!/bin/bash' > /tmp/mysql
          echo '/usr/bin/mysql -h 127.0.0.1 -u root -proot "$@"' >> /tmp/mysql
          chmod +x /tmp/mysql
          export PATH=/tmp:$PATH

          bash .github-offline/regression-tests.sh

      - name: Frontend Verification
        if: always()
        run: |
          # Install dependencies for Playwright
          pip install -r .github/requirements.txt
          # Install system dependencies for Chromium
          python -m playwright install-deps chromium
          # Install Chromium browser only if cache was missed
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            python -m playwright install chromium
          fi
          # Run the web server in background if it's not already running
          php -S localhost:8000 -t . > server.log 2>&1 &
          sleep 2
          python .github/verify_frontend.py || echo "Frontend verification failed"
          kill $! || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-php-${{ matrix.php }}
          path: "*.log"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-php-${{ matrix.php }}
          path: verification/*.png
